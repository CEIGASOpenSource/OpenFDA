name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: openfda.exe
            pyinstaller_name: openfda.exe
          - os: macos-latest
            artifact: openfda-mac
            pyinstaller_name: openfda

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build standalone binary
        run: pyinstaller openfda.spec

      - name: Rename artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: mv dist/openfda dist/openfda-mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/openfda.exe/openfda.exe
            artifacts/openfda-mac/openfda-mac
