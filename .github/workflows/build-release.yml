name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            zip_name: openfda-windows.zip
          - os: macos-latest
            zip_name: openfda-mac.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller openfda.spec

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist\openfda\* -DestinationPath ${{ matrix.zip_name }}
        shell: pwsh

      - name: Zip (macOS)
        if: matrix.os == 'macos-latest'
        run: cd dist && zip -r ../${{ matrix.zip_name }} openfda/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/openfda-windows.zip/openfda-windows.zip
            artifacts/openfda-mac.zip/openfda-mac.zip
